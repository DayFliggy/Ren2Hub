<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta id="theme-color" name="theme-color" content="#F6F3EB" />
    <meta
      name="description"
      content="One key for major AI models, with unified routing, billing, and observability."
    />
    <script>
      ;(() => {
        const root = document.documentElement
        let preference = 'auto'
        try {
          const stored = localStorage.getItem('renren_theme_mode')
          if (stored === 'light' || stored === 'dark' || stored === 'auto')
            preference = stored
        } catch {}

        const systemDark = window.matchMedia(
          '(prefers-color-scheme: dark)'
        ).matches
        const dark =
          preference === 'dark' || (preference === 'auto' && systemDark)
        root.classList.toggle('dark', dark)
        root.classList.toggle('light', !dark)
        root.dataset.theme = dark ? 'dark' : 'light'
        root.style.colorScheme = dark ? 'dark' : 'light'
        document
          .querySelector('#theme-color')
          ?.setAttribute('content', dark ? '#262A34' : '#F6F3EB')
      })()
    </script>
    <title>Ren2Hub | One Key, All Models</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
